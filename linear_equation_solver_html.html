<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Linear Equation Solver (Step-by-Step)</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      text-align: center;
      padding: 20px;
    }
    .container {
      background: rgba(0,0,0,0.3);
      padding: 20px;
      border-radius: 15px;
      max-width: 600px;
      margin: auto;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }
    input {
      width: 80px;
      padding: 8px;
      margin: 5px;
      border-radius: 8px;
      border: none;
      text-align: center;
    }
    button {
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background: #ff7eb3;
      color: white;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
    }
    button:hover { background: #ff4f91; }
    .result { margin-top: 15px; font-size: 18px; font-weight: bold; }
    .steps {
      text-align: left;
      background: rgba(255,255,255,0.1);
      padding: 15px;
      border-radius: 10px;
      margin-top: 15px;
      font-size: 14px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Linear Equation Solver (Step-by-Step)</h2>

    <p>Equation 1: ax + by = c</p>
    <input id="a1" placeholder="a">
    <input id="b1" placeholder="b">
    <input id="c1" placeholder="c">

    <p>Equation 2: dx + ey = f</p>
    <input id="a2" placeholder="d">
    <input id="b2" placeholder="e">
    <input id="c2" placeholder="f">

    <br>
    <button onclick="solve()">Solve</button>

    <div class="result" id="result"></div>
    <div class="steps" id="steps"></div>
  </div>

  <script>
    function solve() {
      let a = parseFloat(document.getElementById('a1').value);
      let b = parseFloat(document.getElementById('b1').value);
      let c = parseFloat(document.getElementById('c1').value);
      let d = parseFloat(document.getElementById('a2').value);
      let e = parseFloat(document.getElementById('b2').value);
      let f = parseFloat(document.getElementById('c2').value);

      let steps = "";

      steps += "Step 1: Write equations\n";
      steps += `${a}x + ${b}y = ${c}\n`;
      steps += `${d}x + ${e}y = ${f}\n\n`;

      let determinant = a*e - b*d;
      steps += "Step 2: Find determinant (ae - bd)\n";
      steps += `(${a}×${e}) - (${b}×${d}) = ${determinant}\n\n`;

      if (determinant === 0) {
        document.getElementById('result').innerText = "No unique solution";
        document.getElementById('steps').innerText = steps + "Determinant = 0 → No unique solution";
        return;
      }

      steps += "Step 3: Find x using formula\n";
      steps += "x = (ce - bf) / (ae - bd)\n";
      let x = (c*e - b*f) / determinant;
      steps += `x = ((${c}×${e}) - (${b}×${f})) / ${determinant} = ${x}\n\n`;

      steps += "Step 4: Find y using formula\n";
      steps += "y = (af - cd) / (ae - bd)\n";
      let y = (a*f - c*d) / determinant;
      steps += `y = ((${a}×${f}) - (${c}×${d})) / ${determinant} = ${y}\n\n`;

      steps += "Final Answer:\n";
      steps += `x = ${x.toFixed(2)}, y = ${y.toFixed(2)}`;

      document.getElementById('result').innerText = `x = ${x.toFixed(2)}, y = ${y.toFixed(2)}`;
      document.getElementById('steps').innerText = steps;
    }
  </script>
</body>
</html>
